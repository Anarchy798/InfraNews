name: Daily Infrastructure News Digest

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python scripts/fetch_news.py
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily infrastructure news update"
          file_pattern: "data/news.json"
          commit_user_name: "InfraNews Bot"
          commit_user_email: "actions@github.com"
