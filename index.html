<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraNews Europe — PE Infrastructure Intelligence</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0f5fa;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #1a2a3a;
  }

  #three-canvas { position: fixed; inset: 0; z-index: 0; }

  #loading {
    position: fixed; inset: 0; background: #f0f5fa;
    display: flex; align-items: center; justify-content: center;
    z-index: 200; transition: opacity 0.6s ease;
  }
  #loading.fade-out { opacity: 0; pointer-events: none; }
  .loader-inner { text-align: center; }
  .loader-ring {
    width: 52px; height: 52px;
    border: 2px solid rgba(26,48,80,0.15);
    border-top-color: #1a3050;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  .loader-label { color: #1a3050; font-size: 0.7rem; letter-spacing: 0.28em; text-transform: uppercase; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; }

  #header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 28px;
    background: linear-gradient(to bottom, rgba(14,28,56,0.82) 0%, transparent 100%);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 42px; height: 42px;
    border: 1.5px solid rgba(245,158,11,0.7); border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(245,158,11,0.10);
  }
  .brand-text h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.1em; color: #fff; }
  .brand-text p  { font-size: 0.62rem; color: #f59e0b; letter-spacing: 0.22em; text-transform: uppercase; margin-top: 1px; }
  .header-stats { display: flex; gap: 32px; }
  .stat { text-align: right; }
  .stat-value { font-size: 1.1rem; font-weight: 700; color: #f59e0b; }
  .stat-label { font-size: 0.6rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 1px; }

  #content {
    flex: 1; display: flex; align-items: stretch;
    padding: 0 28px 22px; gap: 20px; overflow: hidden; min-height: 0;
  }

  #news-panel {
    width: 370px; flex-shrink: 0;
    background: rgba(10,20,46,0.90);
    border: 1px solid rgba(245,158,11,0.28); border-radius: 14px;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    display: flex; flex-direction: column; pointer-events: all; overflow: hidden;
  }
  .panel-head {
    padding: 14px 18px; border-bottom: 1px solid rgba(245,158,11,0.14);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .panel-title { font-size: 0.68rem; font-weight: 600; color: #f59e0b; letter-spacing: 0.18em; text-transform: uppercase; }
  .panel-badge {
    font-size: 0.62rem; color: #f59e0b;
    background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3);
    padding: 3px 9px; border-radius: 99px;
  }
  #news-list {
    overflow-y: auto; flex: 1; padding: 10px;
    display: flex; flex-direction: column; gap: 8px; min-height: 0;
  }
  #news-list::-webkit-scrollbar { width: 3px; }
  #news-list::-webkit-scrollbar-track { background: transparent; }
  #news-list::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.3); border-radius: 2px; }

  .news-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px; padding: 13px; cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s; flex-shrink: 0;
  }
  .news-card:hover { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.36); transform: translateX(2px); }
  .card-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; flex-wrap: wrap; }
  .card-source { font-size: 0.6rem; color: #8a97a8; text-transform: uppercase; letter-spacing: 0.08em; }
  .card-dot { width: 2px; height: 2px; background: #4a5a6a; border-radius: 50%; }
  .card-time { font-size: 0.6rem; color: #4a5a6a; }
  .card-sector {
    font-size: 0.58rem; font-weight: 600; padding: 2px 7px; border-radius: 99px;
    text-transform: uppercase; letter-spacing: 0.06em; margin-left: auto;
  }
  .card-title { font-size: 0.82rem; font-weight: 600; color: #f0f4ff; line-height: 1.4; margin-bottom: 7px; }
  .card-summary {
    font-size: 0.73rem; color: #8a97a8; line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .pe-row { display: flex; align-items: center; gap: 6px; }
  .pe-lbl { font-size: 0.58rem; color: #6b7a8d; text-transform: uppercase; letter-spacing: 0.08em; }
  .pe-bar { width: 54px; height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; }
  .pe-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .pe-num { font-size: 0.68rem; font-weight: 700; }
  .card-country { font-size: 0.62rem; color: #5a6a7a; }
  .card-angle {
    font-size: 0.6rem; color: #6b7a8d;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    padding: 2px 7px; border-radius: 99px; margin-top: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }

  #legend {
    margin-top: auto; margin-left: auto; align-self: flex-end;
    background: rgba(10,20,46,0.90); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 11px; padding: 13px 16px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); pointer-events: all;
  }
  .legend-title { font-size: 0.58rem; color: #6b7a8d; text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 10px; }
  .legend-items { display: flex; flex-direction: column; gap: 7px; }
  .legend-item { display: flex; align-items: center; gap: 9px; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .legend-text { font-size: 0.68rem; color: #b8c4d0; }

  #tooltip {
    position: fixed; background: rgba(10,20,46,0.96);
    border: 1px solid rgba(245,158,11,0.45); border-radius: 9px; padding: 10px 14px;
    backdrop-filter: blur(10px); pointer-events: none; z-index: 50;
    opacity: 0; transition: opacity 0.15s; transform: translateY(-4px);
  }
  #tooltip.show { opacity: 1; transform: translateY(0); }
  #tt-name { font-size: 0.82rem; font-weight: 700; color: #f59e0b; margin-bottom: 3px; }
  #tt-sector { font-size: 0.65rem; color: #b8c4d0; }

  @media (max-width: 768px) {
    #news-panel { width: 100%; position: fixed; bottom: 0; left: 0; right: 0; height: 55vh; border-radius: 14px 14px 0 0; }
    #legend { display: none; }
    #content { padding: 0 0 55vh; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-inner">
    <div class="loader-ring"></div>
    <div class="loader-label">InfraNews Europe</div>
  </div>
</div>

<canvas id="three-canvas"></canvas>
<div id="tooltip"><div id="tt-name"></div><div id="tt-sector"></div></div>

<div id="ui">
  <div id="header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 20h20M4 20V10l8-8 8 8v10M9 20v-5h6v5"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>INFRANEWS</h1>
        <p>European Infrastructure Intelligence</p>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-value" id="stat-articles">—</div><div class="stat-label">Today's Stories</div></div>
      <div class="stat"><div class="stat-value">27</div><div class="stat-label">Markets Tracked</div></div>
      <div class="stat"><div class="stat-value" id="stat-updated">—</div><div class="stat-label">Last Updated</div></div>
    </div>
  </div>

  <div id="content">
    <div id="news-panel">
      <div class="panel-head">
        <span class="panel-title">PE Investment Intelligence</span>
        <span class="panel-badge" id="panel-count">Loading…</span>
      </div>
      <div id="news-list">
        <div style="color:#6b7a8d;font-size:0.78rem;text-align:center;padding:50px 20px;line-height:1.7">
          Fetching infrastructure intelligence…
        </div>
      </div>
    </div>

    <div id="legend">
      <div class="legend-title">Sector Line</div>
      <div class="legend-items">
        <div class="legend-item">
          <div class="legend-dot" style="background:#e07b00;box-shadow:0 0 6px #e07b00aa"></div>
          <span class="legend-text">Energy</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#1a5fd4;box-shadow:0 0 6px #1a5fd4aa"></div>
          <span class="legend-text">Transport</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#0095bb;box-shadow:0 0 6px #0095bbaa"></div>
          <span class="legend-text">Utilities</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script>
var NEWS_JSON_URL = 'https://anarchy798.github.io/infranews/data/news.json';

// ── Sector colours ───────────────────────────────────────────────────────────
var SC = {
  energy:    0xe07b00,
  transport: 0x1a5fd4,
  utilities: 0x0095bb,
};

// ── European infrastructure hub network (subway-map grid positions) ──────────
// Positions use a schematic grid: x = west-east, y = slight elevation, z = north-south
var NODES = [
  // West Atlantic arc
  { name:'Dublin',     pos:[-8.0, 0.0,  0.5], sector:'utilities' },
  { name:'Lisbon',     pos:[-7.0, 0.0,  4.0], sector:'transport' },
  { name:'Madrid',     pos:[-5.0, 0.0,  3.0], sector:'transport' },
  // Core West
  { name:'London',     pos:[-5.0, 0.0,  0.0], sector:'utilities' },
  { name:'Paris',      pos:[-3.0, 0.0,  1.0], sector:'energy'    },
  { name:'Barcelona',  pos:[-3.0, 0.0,  4.0], sector:'transport' },
  // Benelux + Rhine
  { name:'Brussels',   pos:[-1.0, 0.0,  0.0], sector:'utilities' },
  { name:'Amsterdam',  pos:[-1.0, 0.0, -1.5], sector:'utilities' },
  { name:'Frankfurt',  pos:[ 1.0, 0.0,  0.0], sector:'energy'    },
  { name:'Hamburg',    pos:[ 1.0, 0.0, -2.5], sector:'transport' },
  { name:'Zurich',     pos:[ 1.0, 0.0,  2.0], sector:'utilities' },
  { name:'Munich',     pos:[ 2.0, 0.0,  1.5], sector:'transport' },
  // Northern arc
  { name:'Copenhagen', pos:[ 1.0, 0.0, -4.0], sector:'utilities' },
  { name:'Oslo',       pos:[ 0.0, 0.0, -5.5], sector:'energy'    },
  { name:'Stockholm',  pos:[ 2.5, 0.0, -5.0], sector:'energy'    },
  { name:'Helsinki',   pos:[ 4.0, 0.0, -5.5], sector:'energy'    },
  // Central/Eastern
  { name:'Vienna',     pos:[ 3.0, 0.0,  0.5], sector:'energy'    },
  { name:'Prague',     pos:[ 2.5, 0.0, -1.0], sector:'utilities' },
  { name:'Warsaw',     pos:[ 4.0, 0.0, -2.0], sector:'energy'    },
  { name:'Budapest',   pos:[ 4.0, 0.0,  1.5], sector:'energy'    },
  { name:'Bucharest',  pos:[ 5.5, 0.0,  1.0], sector:'energy'    },
  // Southern arc
  { name:'Milan',      pos:[ 0.5, 0.0,  3.0], sector:'transport' },
  { name:'Rome',       pos:[ 1.5, 0.0,  5.0], sector:'utilities' },
  { name:'Athens',     pos:[ 4.0, 0.0,  5.5], sector:'transport' },
];

// ── Scene ────────────────────────────────────────────────────────────────────
var canvas = document.getElementById('three-canvas');
var W = window.innerWidth, H = window.innerHeight;
var scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f5fa);
scene.fog = new THREE.Fog(0xeaf2f8, 28, 55);

var camera = new THREE.PerspectiveCamera(52, W / H, 0.1, 120);
camera.position.set(0, 14, 18);
camera.lookAt(0, 0, 0);

var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

window.addEventListener('resize', function() {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// ── Lights ───────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 4.0));
var sun = new THREE.DirectionalLight(0xfff5e0, 1.8);
sun.position.set(10, 20, 8);
scene.add(sun);

// ── Ground grid (blueprint / transit map feel) ───────────────────────────────
scene.add(new THREE.GridHelper(40, 20, 0x9ab8d0, 0xc8dcea));
var fineGrid = new THREE.GridHelper(40, 80, 0xd8eaf4, 0xe6f0f8);
fineGrid.position.y = 0.001;
scene.add(fineGrid);

// ── Network group ────────────────────────────────────────────────────────────
var group = new THREE.Group();
scene.add(group);

// ── Build connections first (so nodes render on top) ─────────────────────────
var MAX_D = 3.8;
var connections = [];

for (var i = 0; i < NODES.length; i++) {
  for (var j = i + 1; j < NODES.length; j++) {
    var A = new THREE.Vector3(NODES[i].pos[0], 0, NODES[i].pos[2]);
    var B = new THREE.Vector3(NODES[j].pos[0], 0, NODES[j].pos[2]);
    if (A.distanceTo(B) > MAX_D) continue;

    // Subway-style orthogonal routing: go along X first, then Z
    var mid = new THREE.Vector3(B.x, 0, A.z);
    var pts = [A.clone(), mid.clone(), B.clone()];

    // Colour: shared sector gets that sector's colour, mixed gets a neutral grey-blue
    var lineColor = (NODES[i].sector === NODES[j].sector)
      ? SC[NODES[i].sector]
      : 0x7799bb;

    var geo = new THREE.BufferGeometry().setFromPoints(pts);
    var mat = new THREE.LineBasicMaterial({ color: lineColor, transparent: true, opacity: 0.7 });
    var line = new THREE.Line(geo, mat);
    group.add(line);
    connections.push({ line: line, from: A.clone(), mid: mid.clone(), to: B.clone(), phase: Math.random() * Math.PI * 2 });
  }
}

// ── Station nodes ─────────────────────────────────────────────────────────────
var nodeMeshes = [];
var nodeData   = [];

NODES.forEach(function(nd) {
  var col = SC[nd.sector] || 0x7799bb;
  var pos = new THREE.Vector3(nd.pos[0], 0, nd.pos[2]);

  // Outer ring (sector colour) — subway station circle
  var ringMat = new THREE.MeshBasicMaterial({ color: col, side: THREE.DoubleSide });
  var ring = new THREE.Mesh(new THREE.RingGeometry(0.18, 0.28, 24), ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.copy(pos);
  group.add(ring);

  // White fill centre
  var fillMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
  var fill = new THREE.Mesh(new THREE.CircleGeometry(0.18, 24), fillMat);
  fill.rotation.x = -Math.PI / 2;
  fill.position.set(pos.x, 0.01, pos.z);
  group.add(fill);

  // Invisible hit sphere for raycasting
  var hitMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 8, 8),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  hitMesh.position.copy(pos);
  hitMesh.userData = { node: nd };
  group.add(hitMesh);
  nodeMeshes.push(hitMesh);

  // Glow disc (additive) — sits just below
  var glowMat = new THREE.MeshBasicMaterial({
    color: col, transparent: true, opacity: 0.18,
    depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  var glow = new THREE.Mesh(new THREE.CircleGeometry(0.55, 24), glowMat);
  glow.rotation.x = -Math.PI / 2;
  glow.position.set(pos.x, -0.01, pos.z);
  group.add(glow);

  nodeData.push({ ring: ring, fill: fill, glow: glow, pos: pos, phase: Math.random() * Math.PI * 2, col: col });
});

// ── Animated trains on connections ───────────────────────────────────────────
var trains = [];
connections.forEach(function(conn) {
  // 1–2 trains per connection
  var count = Math.random() < 0.4 ? 2 : 1;
  for (var t = 0; t < count; t++) {
    var trainMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.09, 8, 8),
      new THREE.MeshBasicMaterial({
        color: conn.line.material.color.getHex(),
        transparent: true, opacity: 0.95,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    group.add(trainMesh);
    trains.push({ mesh: trainMesh, conn: conn, t: Math.random(), speed: 0.003 + Math.random() * 0.003 });
  }
});

// ── Raycaster for hover tooltip ───────────────────────────────────────────────
var raycaster = new THREE.Raycaster();
var mouse = new THREE.Vector2(-9, -9);
var tooltip = document.getElementById('tooltip');
window.addEventListener('mousemove', function(e) {
  mouse.x =  (e.clientX / W) * 2 - 1;
  mouse.y = -(e.clientY / H) * 2 + 1;
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 12) + 'px';
});

// ── Animation ────────────────────────────────────────────────────────────────
var frame = 0;
var orbitAngle = 0.3;
var ORBIT_R = 22;
var ORBIT_S = 0.00018;

function animate() {
  requestAnimationFrame(animate);
  frame++;
  var t = frame * 0.01;

  // Slow turntable orbit — high angle so map reads clearly
  orbitAngle += ORBIT_S;
  camera.position.x = Math.sin(orbitAngle) * ORBIT_R;
  camera.position.z = Math.cos(orbitAngle) * ORBIT_R;
  camera.position.y = 13 + Math.sin(orbitAngle * 0.18) * 2;
  camera.lookAt(0, 0, 0);

  // Pulse station glow rings
  nodeData.forEach(function(nd) {
    var s = 0.9 + Math.sin(t * 1.8 + nd.phase) * 0.12;
    nd.glow.scale.set(s, s, s);
    nd.glow.material.opacity = 0.12 + Math.sin(t * 2.2 + nd.phase) * 0.07;
  });

  // Pulse connection line opacity
  connections.forEach(function(c) {
    c.line.material.opacity = 0.55 + Math.sin(t * 1.2 + c.phase) * 0.18;
  });

  // Move trains along their connections
  trains.forEach(function(tr) {
    tr.t += tr.speed;
    if (tr.t > 1) tr.t = 0;
    var p = tr.t;
    // Two-segment path: from → mid → to
    var pos;
    if (p < 0.5) {
      pos = tr.conn.from.clone().lerp(tr.conn.mid, p * 2);
    } else {
      pos = tr.conn.mid.clone().lerp(tr.conn.to, (p - 0.5) * 2);
    }
    tr.mesh.position.set(pos.x, 0.1, pos.z);
  });

  // Hover detection
  raycaster.setFromCamera(mouse, camera);
  var hits = raycaster.intersectObjects(nodeMeshes);
  if (hits.length) {
    var nd = hits[0].object.userData.node;
    document.getElementById('tt-name').textContent = nd.name;
    document.getElementById('tt-sector').textContent = nd.sector.charAt(0).toUpperCase() + nd.sector.slice(1) + ' Hub';
    tooltip.classList.add('show');
    document.body.style.cursor = 'pointer';
  } else {
    tooltip.classList.remove('show');
    document.body.style.cursor = 'default';
  }

  renderer.render(scene, camera);
}
animate();

// ── News feed ────────────────────────────────────────────────────────────────
var SECTOR_CSS = {
  energy:    { bg: 'rgba(224,123,0,0.15)',  color: '#e07b00' },
  transport: { bg: 'rgba(26,95,212,0.15)',  color: '#1a5fd4' },
  utilities: { bg: 'rgba(0,149,187,0.15)',  color: '#0095bb' },
};
var DEFAULT_CSS = { bg: 'rgba(26,95,212,0.12)', color: '#1a5fd4' };

function peColor(s) {
  return s >= 8 ? '#10b981' : s >= 6 ? '#f59e0b' : '#6b7280';
}
function timeAgo(iso) {
  var h = Math.floor((Date.now() - new Date(iso).getTime()) / 3600000);
  if (h < 1) return 'Just now';
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function renderNews(items) {
  document.getElementById('panel-count').textContent = items.length + ' stories';
  document.getElementById('stat-articles').textContent = items.length;
  if (items.length > 0) {
    var d = new Date(items[0].published || items[0].fetched_at);
    document.getElementById('stat-updated').textContent =
      d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }
  var T = function(s) { return (s || '').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  document.getElementById('news-list').innerHTML = items.map(function(item) {
    var sc = SECTOR_CSS[item.sector] || DEFAULT_CSS;
    var score = parseInt(item.pe_score) || 5;
    var fill = peColor(score);
    return [
      '<div class="news-card" onclick="window.open(\'' + encodeURI(item.url||'#') + '\',\'_blank\')">',
      '<div class="card-meta">',
      '<span class="card-source">' + T(item.source) + '</span>',
      '<span class="card-dot"></span>',
      '<span class="card-time">' + timeAgo(item.published || item.fetched_at) + '</span>',
      '<span class="card-sector" style="background:' + sc.bg + ';color:' + sc.color + '">' + T(item.sector||'infra') + '</span>',
      '</div>',
      '<div class="card-title">' + T(item.title) + '</div>',
      '<div class="card-summary">' + T(item.summary) + '</div>',
      '<div class="card-footer">',
      '<div class="pe-row"><span class="pe-lbl">PE Score</span>',
      '<div class="pe-bar"><div class="pe-fill" style="width:' + (score*10) + '%;background:' + fill + '"></div></div>',
      '<span class="pe-num" style="color:' + fill + '">' + score + '/10</span></div>',
      '<span class="card-country">' + T(item.country||'Europe') + '</span>',
      '</div>',
      item.pe_angle ? '<div class="card-angle">' + T(item.pe_angle) + '</div>' : '',
      '</div>',
    ].join('');
  }).join('');
}

function fetchNews() {
  fetch(NEWS_JSON_URL + '?_=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      renderNews(Array.isArray(data) ? data : (data.articles || data.items || []));
    })
    .catch(function() {
      document.getElementById('news-list').innerHTML =
        '<div style="color:#6b7a8d;font-size:0.76rem;padding:30px 18px;text-align:center;line-height:1.7">' +
        'News digest updating…<br><span style="font-size:0.68rem;color:#4a5a6a">Runs daily at 06:00 UTC</span></div>';
      document.getElementById('panel-count').textContent = 'Updating';
      document.getElementById('stat-articles').textContent = '—';
      document.getElementById('stat-updated').textContent = '—';
    });
}

fetchNews();
setInterval(fetchNews, 5 * 60 * 1000);

setTimeout(function() {
  document.getElementById('loading').classList.add('fade-out');
  setTimeout(function() { document.getElementById('loading').style.display = 'none'; }, 700);
}, 900);
</script>
</body>
</html>
