<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraNews Europe — PE Infrastructure Intelligence</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #070b14;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e5e7eb;
  }

  #three-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  #loading {
    position: fixed; inset: 0;
    background: #070b14;
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    transition: opacity 0.6s ease;
  }
  #loading.fade-out { opacity: 0; pointer-events: none; }
  .loader-inner { text-align: center; }
  .loader-ring {
    width: 56px; height: 56px;
    border: 2px solid rgba(245,158,11,0.2);
    border-top-color: #f59e0b;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 18px;
  }
  .loader-label { color: #f59e0b; font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #ui {
    position: fixed; inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex; flex-direction: column;
  }

  #header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 28px;
    background: linear-gradient(to bottom, rgba(7,11,20,0.92) 0%, transparent 100%);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 42px; height: 42px;
    border: 1.5px solid rgba(245,158,11,0.6);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(245,158,11,0.08);
  }
  .brand-text h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.1em; color: #fff; }
  .brand-text p  { font-size: 0.62rem; color: #f59e0b; letter-spacing: 0.22em; text-transform: uppercase; margin-top: 1px; }

  .header-stats { display: flex; gap: 32px; }
  .stat { text-align: right; }
  .stat-value { font-size: 1.1rem; font-weight: 700; color: #f59e0b; }
  .stat-label { font-size: 0.6rem; color: #4b5563; text-transform: uppercase; letter-spacing: 0.12em; margin-top: 1px; }

  #content {
    flex: 1;
    display: flex;
    align-items: stretch;
    padding: 0 28px 22px;
    gap: 20px;
    overflow: hidden;
    min-height: 0;
  }

  #news-panel {
    width: 370px;
    flex-shrink: 0;
    background: rgba(7,11,20,0.78);
    border: 1px solid rgba(245,158,11,0.18);
    border-radius: 14px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex; flex-direction: column;
    pointer-events: all;
    overflow: hidden;
  }
  .panel-head {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(245,158,11,0.12);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-title { font-size: 0.68rem; font-weight: 600; color: #f59e0b; letter-spacing: 0.18em; text-transform: uppercase; }
  .panel-badge {
    font-size: 0.62rem; color: #f59e0b;
    background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3);
    padding: 3px 9px; border-radius: 99px;
  }

  #news-list {
    overflow-y: auto;
    flex: 1;
    padding: 10px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 0;
  }
  #news-list::-webkit-scrollbar { width: 3px; }
  #news-list::-webkit-scrollbar-track { background: transparent; }
  #news-list::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.25); border-radius: 2px; }

  .news-card {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 13px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .news-card:hover {
    background: rgba(245,158,11,0.06);
    border-color: rgba(245,158,11,0.28);
    transform: translateX(2px);
  }

  .card-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; flex-wrap: wrap; }
  .card-source { font-size: 0.6rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; }
  .card-dot { width: 2px; height: 2px; background: #374151; border-radius: 50%; }
  .card-time { font-size: 0.6rem; color: #374151; }
  .card-sector {
    font-size: 0.58rem; font-weight: 600;
    padding: 2px 7px; border-radius: 99px;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-left: auto;
  }

  .card-title { font-size: 0.82rem; font-weight: 600; color: #e5e7eb; line-height: 1.4; margin-bottom: 7px; }
  .card-summary {
    font-size: 0.73rem; color: #6b7280; line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .pe-row { display: flex; align-items: center; gap: 6px; }
  .pe-lbl { font-size: 0.58rem; color: #4b5563; text-transform: uppercase; letter-spacing: 0.08em; }
  .pe-bar { width: 54px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .pe-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .pe-num { font-size: 0.68rem; font-weight: 700; }
  .card-country { font-size: 0.62rem; color: #374151; }
  .card-angle {
    font-size: 0.6rem; color: #4b5563;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    padding: 2px 7px; border-radius: 99px; margin-top: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }

  #legend {
    margin-top: auto;
    margin-left: auto;
    align-self: flex-end;
    background: rgba(7,11,20,0.78);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 11px;
    padding: 13px 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    pointer-events: all;
  }
  .legend-title { font-size: 0.58rem; color: #4b5563; text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 10px; }
  .legend-items { display: flex; flex-direction: column; gap: 7px; }
  .legend-item { display: flex; align-items: center; gap: 9px; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .legend-text { font-size: 0.68rem; color: #9ca3af; }

  #tooltip {
    position: fixed;
    background: rgba(7,11,20,0.95);
    border: 1px solid rgba(245,158,11,0.35);
    border-radius: 9px; padding: 10px 14px;
    backdrop-filter: blur(10px);
    pointer-events: none; z-index: 50;
    opacity: 0; transition: opacity 0.15s;
    transform: translateY(-4px);
  }
  #tooltip.show { opacity: 1; transform: translateY(0); }
  #tt-name { font-size: 0.82rem; font-weight: 700; color: #f59e0b; margin-bottom: 3px; }
  #tt-sector { font-size: 0.65rem; color: #9ca3af; }

  @media (max-width: 768px) {
    #news-panel { width: 100%; position: fixed; bottom: 0; left: 0; right: 0; height: 55vh; border-radius: 14px 14px 0 0; }
    #legend { display: none; }
    #content { padding: 0 0 55vh; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-inner">
    <div class="loader-ring"></div>
    <div class="loader-label">InfraNews Europe</div>
  </div>
</div>

<canvas id="three-canvas"></canvas>

<div id="tooltip">
  <div id="tt-name"></div>
  <div id="tt-sector"></div>
</div>

<div id="ui">
  <div id="header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 20h20M4 20V10l8-8 8 8v10M9 20v-5h6v5"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>INFRANEWS</h1>
        <p>European Infrastructure Intelligence</p>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-value" id="stat-articles">—</div>
        <div class="stat-label">Today's Stories</div>
      </div>
      <div class="stat">
        <div class="stat-value">27</div>
        <div class="stat-label">Markets Tracked</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-updated">—</div>
        <div class="stat-label">Last Updated</div>
      </div>
    </div>
  </div>

  <div id="content">
    <div id="news-panel">
      <div class="panel-head">
        <span class="panel-title">PE Investment Intelligence</span>
        <span class="panel-badge" id="panel-count">Loading…</span>
      </div>
      <div id="news-list">
        <div style="color:#4b5563;font-size:0.78rem;text-align:center;padding:50px 20px;line-height:1.7">
          Fetching infrastructure intelligence…
        </div>
      </div>
    </div>

    <div id="legend">
      <div class="legend-title">Sector</div>
      <div class="legend-items">
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;box-shadow:0 0 5px #f59e0b88"></div><span class="legend-text">Energy</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#3b82f6;box-shadow:0 0 5px #3b82f688"></div><span class="legend-text">Transport</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#10b981;box-shadow:0 0 5px #10b98188"></div><span class="legend-text">Digital</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6;box-shadow:0 0 5px #8b5cf688"></div><span class="legend-text">Finance</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#06b6d4;box-shadow:0 0 5px #06b6d488"></div><span class="legend-text">Utilities</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#ec4899;box-shadow:0 0 5px #ec489988"></div><span class="legend-text">Social</span></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script>
// NEWS_JSON_URL uses a relative path so it always matches the GitHub Pages domain
var NEWS_JSON_URL = './data/news.json';

var SECTOR_COLORS = { energy:0xf59e0b, transport:0x3b82f6, digital:0x10b981, finance:0x8b5cf6, utilities:0x06b6d4, social:0xec4899 };
var DEFAULT_COLOR = 0x6b7280;

var NODES = [
  { name:'London',     pos:[-2.8, 0.6, 0.0], sector:'finance'   },
  { name:'Paris',      pos:[-1.2, 0.0, 0.4], sector:'energy'    },
  { name:'Frankfurt',  pos:[ 0.5, 0.4, 0.6], sector:'finance'   },
  { name:'Amsterdam',  pos:[-0.4, 1.0, 0.2], sector:'digital'   },
  { name:'Brussels',   pos:[-0.8, 0.5, 0.5], sector:'social'    },
  { name:'Madrid',     pos:[-2.2,-1.6, 0.4], sector:'transport' },
  { name:'Barcelona',  pos:[-1.0,-1.2, 0.7], sector:'transport' },
  { name:'Milan',      pos:[ 0.8,-0.7, 0.9], sector:'transport' },
  { name:'Rome',       pos:[ 1.2,-1.5, 0.7], sector:'social'    },
  { name:'Warsaw',     pos:[ 2.5, 0.7, 0.3], sector:'energy'    },
  { name:'Stockholm',  pos:[ 1.1, 2.3, 0.0], sector:'digital'   },
  { name:'Oslo',       pos:[ 0.1, 2.7,-0.4], sector:'energy'    },
  { name:'Copenhagen', pos:[ 0.7, 1.9,-0.2], sector:'digital'   },
  { name:'Helsinki',   pos:[ 2.7, 2.5,-0.3], sector:'digital'   },
  { name:'Vienna',     pos:[ 1.8, 0.1, 0.7], sector:'energy'    },
  { name:'Zurich',     pos:[ 0.3,-0.2, 1.1], sector:'finance'   },
  { name:'Prague',     pos:[ 1.9, 0.5, 0.5], sector:'digital'   },
  { name:'Budapest',   pos:[ 2.4,-0.3, 0.5], sector:'energy'    },
  { name:'Lisbon',     pos:[-3.1,-1.9, 0.1], sector:'transport' },
  { name:'Dublin',     pos:[-3.5, 0.9,-0.4], sector:'digital'   },
  { name:'Athens',     pos:[ 2.3,-2.3, 0.3], sector:'transport' },
  { name:'Bucharest',  pos:[ 3.1,-0.7, 0.2], sector:'energy'    },
  { name:'Hamburg',    pos:[ 0.5, 1.3, 0.1], sector:'transport' },
  { name:'Munich',     pos:[ 1.0,-0.1, 0.9], sector:'transport' },
];

var canvas = document.getElementById('three-canvas');
var W = window.innerWidth, H = window.innerHeight;
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x070b14);
scene.fog = new THREE.FogExp2(0x070b14, 0.028);
var camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 150);
camera.position.set(0, 5.5, 14);
camera.lookAt(0, 0, 0);
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

window.addEventListener('resize', function() {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W/H; camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

scene.add(new THREE.AmbientLight(0x0d1a33, 3));
var kl = new THREE.DirectionalLight(0x3355ff, 1.2);
kl.position.set(4,8,6); scene.add(kl);

var group = new THREE.Group(); scene.add(group);
var grid = new THREE.GridHelper(28,28,0x0f1e38,0x0a1428);
grid.position.y = -2.2; group.add(grid);

var nodeMeshes = [], nodeData = [];
NODES.forEach(function(nd) {
  var color = SECTOR_COLORS[nd.sector] || DEFAULT_COLOR;
  var core = new THREE.Mesh(
    new THREE.SphereGeometry(0.11,16,16),
    new THREE.MeshStandardMaterial({ color:color, emissive:color, emissiveIntensity:0.9, metalness:0.2, roughness:0.5 })
  );
  core.position.set(nd.pos[0],nd.pos[1],nd.pos[2]);
  core.userData = { node: nd };
  group.add(core); nodeMeshes.push(core);
  var halo = new THREE.Mesh(
    new THREE.SphereGeometry(0.28,16,16),
    new THREE.MeshBasicMaterial({ color:color, transparent:true, opacity:0.14, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.BackSide })
  );
  halo.position.copy(core.position); group.add(halo);
  nodeData.push({ core:core, halo:halo, baseY:nd.pos[1], phase:Math.random()*Math.PI*2 });
});

var MAX_CONN_DIST = 3.4, connections = [];
for (var i=0;i<NODES.length;i++) for (var j=i+1;j<NODES.length;j++) {
  var a=new THREE.Vector3().fromArray(NODES[i].pos), b=new THREE.Vector3().fromArray(NODES[j].pos);
  if (a.distanceTo(b)<MAX_CONN_DIST) {
    var geo=new THREE.BufferGeometry().setFromPoints([a.clone(),b.clone()]);
    var mat=new THREE.LineBasicMaterial({color:0x1a3060,transparent:true,opacity:0.45,depthWrite:false});
    var line=new THREE.Line(geo,mat); group.add(line);
    connections.push({line:line,from:a.clone(),to:b.clone(),phase:Math.random()*Math.PI*2});
  }
}

var particles=[];
for (var p=0;p<70;p++) {
  var ci=Math.floor(Math.random()*connections.length);
  var conn=connections[ci];
  var ni=Math.floor(Math.random()*NODES.length);
  var pc=SECTOR_COLORS[NODES[ni].sector]||DEFAULT_COLOR;
  var pm=new THREE.Mesh(
    new THREE.SphereGeometry(0.038,6,6),
    new THREE.MeshBasicMaterial({color:pc,transparent:true,opacity:0.85,blending:THREE.AdditiveBlending,depthWrite:false})
  );
  group.add(pm);
  particles.push({mesh:pm,from:conn.from.clone(),to:conn.to.clone(),t:Math.random(),speed:0.0025+Math.random()*0.0035});
}

var sp=[]; for(var s=0;s<1800;s++) sp.push((Math.random()-0.5)*120,(Math.random()-0.5)*120,(Math.random()-0.5)*120);
var sg=new THREE.BufferGeometry();
sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x1a2e50,size:0.07})));

var raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2(-9,-9);
var tooltip=document.getElementById('tooltip');
var ttName=document.getElementById('tt-name'), ttSector=document.getElementById('tt-sector');
window.addEventListener('mousemove',function(e){
  mouse.x=(e.clientX/W)*2-1; mouse.y=-(e.clientY/H)*2+1;
  tooltip.style.left=(e.clientX+14)+'px'; tooltip.style.top=(e.clientY-12)+'px';
});

var frame=0,orbitAngle=0;
function animate(){
  requestAnimationFrame(animate); frame++;
  var t=frame*0.012;
  orbitAngle+=0.0004;
  camera.position.x=Math.sin(orbitAngle)*14;
  camera.position.z=Math.cos(orbitAngle)*14;
  camera.position.y=5+Math.sin(orbitAngle*0.3)*1.5;
  camera.lookAt(0,0,0);
  nodeData.forEach(function(nd){
    nd.core.position.y=nd.baseY+Math.sin(t+nd.phase)*0.09;
    nd.halo.position.copy(nd.core.position);
    nd.halo.scale.setScalar(1+Math.sin(t*2.2+nd.phase)*0.22);
    nd.core.material.emissiveIntensity=0.65+Math.sin(t*3+nd.phase)*0.3;
  });
  particles.forEach(function(p){ p.t+=p.speed; if(p.t>1)p.t=0; p.mesh.position.lerpVectors(p.from,p.to,p.t); });
  connections.forEach(function(c){ c.line.material.opacity=0.3+Math.sin(t*1.5+c.phase)*0.15; });
  raycaster.setFromCamera(mouse,camera);
  var hits=raycaster.intersectObjects(nodeMeshes);
  if(hits.length){ var nd=hits[0].object.userData.node; ttName.textContent=nd.name; ttSector.textContent=nd.sector.charAt(0).toUpperCase()+nd.sector.slice(1)+' Hub'; tooltip.classList.add('show'); document.body.style.cursor='pointer'; }
  else { tooltip.classList.remove('show'); document.body.style.cursor='default'; }
  renderer.render(scene,camera);
}
animate();

var SECTOR_CSS={energy:{bg:'rgba(245,158,11,0.14)',color:'#f59e0b'},transport:{bg:'rgba(59,130,246,0.14)',color:'#3b82f6'},digital:{bg:'rgba(16,185,129,0.14)',color:'#10b981'},finance:{bg:'rgba(139,92,246,0.14)',color:'#8b5cf6'},utilities:{bg:'rgba(6,182,212,0.14)',color:'#06b6d4'},social:{bg:'rgba(236,72,153,0.14)',color:'#ec4899'}};
var DEFAULT_CSS={bg:'rgba(107,114,128,0.14)',color:'#6b7280'};
function peColor(s){return s>=8?'#10b981':s>=6?'#f59e0b':'#6b7280';}
function timeAgo(iso){var d=Date.now()-new Date(iso).getTime(),h=Math.floor(d/3600000);return h<1?'Just now':h<24?h+'h ago':Math.floor(h/24)+'d ago';}
function renderNews(items){
  document.getElementById('panel-count').textContent=items.length+' stories';
  document.getElementById('stat-articles').textContent=items.length;
  if(items.length>0){var d=new Date(items[0].published||items[0].fetched_at);document.getElementById('stat-updated').textContent=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
  document.getElementById('news-list').innerHTML=items.map(function(item){
    var sc=SECTOR_CSS[item.sector]||DEFAULT_CSS, score=parseInt(item.pe_score)||5, fill=peColor(score);
    var t=(item.title||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var s=(item.summary||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var src=(item.source||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var co=(item.country||'Europe').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var an=(item.pe_angle||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var url=encodeURI(item.url||'#');
    return '<div class="news-card" onclick="window.open(\''+url+'\')">'+
      '<div class="card-meta"><span class="card-source">'+src+'</span><span class="card-dot"></span><span class="card-time">'+timeAgo(item.published||item.fetched_at)+'</span><span class="card-sector" style="background:'+sc.bg+';color:'+sc.color+'">'+((item.sector)||'infra')+'</span></div>'+
      '<div class="card-title">'+t+'</div>'+
      '<div class="card-summary">'+s+'</div>'+
      '<div class="card-footer"><div class="pe-row"><span class="pe-lbl">PE Score</span><div class="pe-bar"><div class="pe-fill" style="width:'+(score*10)+'%;background:'+fill+'"></div></div><span class="pe-num" style="color:'+fill+'">'+score+'/10</span></div><span class="card-country">'+co+'</span></div>'+
      (an?'<div class="card-angle">'+an+'</div>':'')+
      '</div>';
  }).join('');
}
function fetchNews(){
  fetch(NEWS_JSON_URL+'?_='+Date.now())
    .then(function(r){return r.json();})
    .then(function(data){renderNews(Array.isArray(data)?data:(data.articles||data.items||[]));  })
    .catch(function(err){
      console.warn('InfraNews fetch error:', err);
      document.getElementById('news-list').innerHTML='<div style="color:#4b5563;font-size:0.76rem;padding:30px 18px;text-align:center;line-height:1.7">News digest updating…<br><span style="font-size:0.68rem;color:#374151">GitHub Action runs daily at 06:00 UTC</span></div>';
      document.getElementById('panel-count').textContent='Updating';
      document.getElementById('stat-articles').textContent='—';
      document.getElementById('stat-updated').textContent='—';
    });
}
fetchNews();
setInterval(fetchNews,300000);
setTimeout(function(){document.getElementById('loading').classList.add('fade-out');setTimeout(function(){document.getElementById('loading').style.display='none';},700);},900);
</script>
</body>
</html>
